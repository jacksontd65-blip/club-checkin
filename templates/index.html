<!DOCTYPE html>
<html>

<head>
<title>Grassfield RC Club Field Check-In</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
font-family: Arial;
text-align: center;
margin-top: 30px;
}

button {
padding: 12px;
margin: 5px;
font-size: 16px;
border-radius: 5px;
border: none;
}

input {
padding: 10px;
font-size: 16px;
width: 200px;
}

.checkin {
background-color: #28a745;
color: white;
}

.checkout {
background-color: #007bff;
color: white;
}

.clear {
background-color: #cc0000;
color: white;
}

</style>

</head>

<body>

<h2>Grassfield RC Club Field Check-In</h2>

<input id="name" placeholder="Enter Name">

<br><br>

<button class="checkin" onclick="checkIn()">Check In</button>
<button class="checkout" onclick="checkOut()">Check Out</button>

<br><br>

<button class="clear" onclick="clearRoster()">Clear Roster</button>

<h3>Present</h3>

<ul id="list"></ul>

<script>

function refresh() {

fetch('/attendees')
.then(res => res.json())
.then(data => {

let list = document.getElementById("list")
list.innerHTML = ""

data.forEach(name => {
let li = document.createElement("li")
li.innerText = name
list.appendChild(li)
})

})

}

function checkIn() {

let name = document.getElementById("name").value

if (!name) return

fetch('/checkin', {
method: 'POST',
headers: {
'Content-Type': 'application/x-www-form-urlencoded'
},
body: 'name=' + encodeURIComponent(name)
})
.then(() => {
document.getElementById("name").value = ""
refresh()
})

}

function checkOut() {

let name = document.getElementById("name").value

if (!name) return

fetch('/checkout', {
method: 'POST',
headers: {
'Content-Type': 'application/x-www-form-urlencoded'
},
body: 'name=' + encodeURIComponent(name)
})
.then(() => {
document.getElementById("name").value = ""
refresh()
})

}

function clearRoster() {

if (!confirm("Clear all attendees?")) return

fetch('/clear', {
method: 'POST'
})
.then(refresh)

}

setInterval(refresh, 3000)

refresh()

</script>

</body>

</html>
